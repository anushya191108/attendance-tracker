<!DOCTYPE html>
<html>
<head>
    <title>Attendance Tracker</title>
    <style>
        body{
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }
        h1{
            text-align: center;
        }
        form{
            text-align: center;
            margin-bottom: 30px;
        }
        input{
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: 1px solid gray;
        }
        button{
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .add-btn{
            background: green;
            color: white;
        }
        .card{
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }
        .warning{
            color: red;
            font-weight: bold;
        }
        .btn-present{
            background: green;
            color: white;
        }
        .btn-absent{
            background: red;
            color: white;
        }
        .btn-delete{
            background: black;
            color: white;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Attendance Tracker</h1>
    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Enter Subject Name" required>
        <button class="add-btn">
            Add Subject
        </button>
    </form>
    {% for sub in subjects %}
    <div class="card">
        <h2>{{ sub.name }}</h2>
        <p>
            Attended:
            <b>{{ sub.attended }}</b>
        </p>
        <p>
            Total Classes:
            <b>{{ sub.total }}</b>
        </p>
        <p>
            Attendance:
            <b>{{ sub.percentage }}%</b>
        </p>
        {% if sub.warning %}
            <p class="warning">
                Attendance below 75%
            </p>
        {% else %}
            <p>
                You can skip
                <b>{{ sub.can_skip }}</b>
                classes
            </p>
        {% endif %}
        <a href="/update/{{ sub.id }}/present">
            <button class="btn-present">
                Present
            </button>
        </a>
        <a href="/update/{{ sub.id }}/absent">
            <button class="btn-absent">
                Absent
            </button>
        </a>
        <a href="/delete/{{ sub.id }}">
            <button class="btn-delete">
                Delete
            </button>
        </a>
    </div>
    {% endfor %}
</body>
</html>
